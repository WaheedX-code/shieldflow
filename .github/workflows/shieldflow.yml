name: ShieldFlow AppSec Pipeline

on:
  workflow_call:
    inputs:
      target-url:
        description: 'URL of the application to scan'
        required: true
        type: string
      target-image:
        description: 'Docker image to spin up for scanning (optional)'
        required: false
        type: string
        default: ''
      target-port:
        description: 'Port the application runs on (optional)'
        required: false
        type: string
        default: '3000'
    secrets:
      shuffle-webhook-url:
        description: 'Shuffle SOAR webhook URL for findings ingestion'
        required: false

jobs:

  sast-semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: returntocorp/semgrep-action@v1
        with:
          config: "p/owasp-top-ten p/javascript"

  sca-trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      - name: Scan Repository Files
        run: |
          trivy fs \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --format json \
            -o trivy-fs.json \
            .

      - name: Scan Docker Image
        if: ${{ inputs.target-image != '' }}
        env:
          TARGET_IMAGE: ${{ inputs.target-image }}
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --format json \
            -o trivy-image.json \
            $TARGET_IMAGE

      - name: Upload Trivy Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: |
            trivy-fs.json
            trivy-image.json

  secrets-gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d '"' -f4)
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/gitleaks_${VERSION#v}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: gitleaks detect --source . --no-git --redact --exit-code 0

  dast-zap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Start Docker target
        if: ${{ inputs.target-image != '' }}
        env:
          TARGET_IMAGE: ${{ inputs.target-image }}
          TARGET_PORT: ${{ inputs.target-port }}
        run: |
          docker pull $TARGET_IMAGE
          docker run -d --name target-app \
            -p "$TARGET_PORT:$TARGET_PORT" \
            $TARGET_IMAGE
          sleep 30
          echo "Target started on port $TARGET_PORT"

      - name: Wait for URL target
        if: ${{ inputs.target-image == '' }}
        run: |
          echo "Scanning existing target: ${{ inputs.target-url }}"
          sleep 5

      - name: Run ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.9.0
        with:
          target: ${{ inputs.target-url }}
          fail_action: true
          cmd_options: '-a'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-dast-results
          path: report_html.html

      - name: Stop Docker target
        if: ${{ inputs.target-image != '' }}
        run: |
          docker stop target-app
          docker rm target-app

  notify-soar:
    runs-on: ubuntu-latest
    needs:
      - sast-semgrep
      - sca-trivy
      - secrets-gitleaks
      - dast-zap
    if: always()
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: POST findings to Shuffle
        env:
          SHUFFLE_WEBHOOK_URL: ${{ secrets.SHUFFLE_WEBHOOK_URL || '' }}
        run: |
          if [ -n "$SHUFFLE_WEBHOOK_URL" ]; then
            python3 soar/soar_connector.py
          else
            echo "No SHUFFLE_WEBHOOK_URL set - skipping SOAR notification"
          fi
