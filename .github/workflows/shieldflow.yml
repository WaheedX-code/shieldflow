name: ShieldFlow Security Pipeline

on:
  workflow_call:
    inputs:
      target-url:
        description: "URL of running application to scan with ZAP"
        required: false
        type: string
        default: ""
      target-image:
        description: "Docker image to spin up and scan"
        required: false
        type: string
        default: ""
      target-port:
        description: "Port the application runs on"
        required: false
        type: string
        default: "3000"
      target-domain:
        description: "Domain for recon + subdomain discovery + SSL check"
        required: false
        type: string
        default: ""
      nuclei-severity:
        description: "Nuclei severity filter (critical,high,medium,low)"
        required: false
        type: string
        default: "critical,high"
      nuclei-tags:
        description: "Nuclei template tags to include"
        required: false
        type: string
        default: "cve,misconfig,exposure,takeover,ssl"
      nuclei-exclude-tags:
        description: "Nuclei template tags to exclude"
        required: false
        type: string
        default: "dos,fuzzing,helpers,headless"
      nuclei-rate-limit:
        description: "Nuclei max requests per second"
        required: false
        type: string
        default: "50"
      nuclei-concurrency:
        description: "Nuclei parallel templates execution"
        required: false
        type: string
        default: "10"
      nuclei-timeout:
        description: "Nuclei seconds per request"
        required: false
        type: string
        default: "10"
      semgrep-config:
        description: "Semgrep ruleset (auto, p/owasp-top-ten, p/python, etc.)"
        required: false
        type: string
        default: "auto"
      trivy-severity:
        description: "Trivy Severity filter (CRITICAL,HIGH,MEDIUM,LOW)"
        required: false
        type: string
        default: "CRITICAL,HIGH"
      trivy-ignore-unfixed:
        description: "Skip CVEs with no fix available"
        required: false
        type: boolean
        default: true
      ssl-scan-limit:
        description: "Max number of subdomains to run SSL checks against"
        required: false
        type: string
        default: "20"
      zap-scan-type:
        description: "ZAP scan type: full (active attacks) or baseline (passive only)"
        required: false
        type: string
        default: "full"
      artifact-retention-days:
        description: "How many days to keep scan artifacts"
        required: false
        type: string
        default: "30"
      fail-on-severity:
        description: "Fail the pipeline if findings at this severity are found (critical,high,none)"
        required: false
        type: string
        default: "critical"
    secrets:
      shuffle-webhook-url:
        required: false

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  sast:
    name: "SAST — Semgrep"
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep
        run: semgrep scan --config ${{ inputs.semgrep-config }} --sarif > semgrep.sarif
        continue-on-error: true

      - name: Guarantee SARIF file exists
        if: always()
        run: |
          if [ ! -f semgrep.sarif ] || [ ! -s semgrep.sarif ]; then
            python3 -c "
          import json, subprocess
          result = subprocess.run(['semgrep', '--version'], capture_output=True, text=True)
          version = result.stdout.strip()
          sarif = {
              'version': '2.1.0',
              'runs': [{
                  'tool': {'driver': {'name': 'Semgrep', 'version': version, 'rules': []}},
                  'results': []
              }]
          }
          json.dump(sarif, open('semgrep.sarif', 'w'))
          "
          fi

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep-sast

      - name: Save Semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep.sarif
          retention-days: ${{ inputs.artifact-retention-days }}

  sca:
    name: "SCA — Trivy"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy (filesystem scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs.sarif"
          severity: ${{ inputs.trivy-severity }}
          ignore-unfixed: ${{ inputs.trivy-ignore-unfixed }}
        continue-on-error: true

      - name: Run Trivy (Docker image scan)
        if: inputs.target-image != ''
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: ${{ inputs.target-image }}
          format: "sarif"
          output: "trivy-image.sarif"
          severity: ${{ inputs.trivy-severity }}
          ignore-unfixed: ${{ inputs.trivy-ignore-unfixed }}
        continue-on-error: true

      - name: Upload Trivy filesystem SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: inputs.target-image != '' && always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Save Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: "trivy-*.sarif"
          retention-days: ${{ inputs.artifact-retention-days }}

  secrets:
    name: "Secrets — Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Save Gitleaks report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-results
          path: results.sarif
          retention-days: ${{ inputs.artifact-retention-days}}

  recon:
    name: "Recon — Subfinder + httpx"
    runs-on: ubuntu-latest
    if: inputs.target-domain != ''
    outputs:
      live-subdomains-found: ${{ steps.recon.outputs.found }}
    steps:
      - name: Install ProjectDiscovery tools
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install -v github.com/projectdiscovery/dnsx/cmd/dnsx@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH
        env:
          GO111MODULE: on

      - name: Passive subdomain enumeration
        id: recon
        run: |
          DOMAIN="${{ inputs.target-domain }}"
          echo "=== ShieldFlow Recon: $DOMAIN ==="

          subfinder -d "$DOMAIN" \
            -silent \
            -o subdomains-raw.txt \
            -timeout 30

          SUBDOMAIN_COUNT=$(wc -l < subdomains-raw.txt 2>/dev/null || echo 0)
          echo "Discovered $SUBDOMAIN_COUNT subdomains"

          cat subdomains-raw.txt | dnsx -silent -resp -o subdomains-resolved.txt

          cat subdomains-resolved.txt | \
            awk '{print $1}' | \
            httpx -silent \
                  -status-code \
                  -title \
                  -tech-detect \
                  -o live-subdomains.txt

          LIVE_COUNT=$(wc -l < live-subdomains.txt 2>/dev/null || echo 0)
          echo "Live subdomains: $LIVE_COUNT"
          echo "found=$LIVE_COUNT" >> $GITHUB_OUTPUT

          cat subdomains-raw.txt | dnsx -cname -silent | \
            grep -E "(github\.io|herokuapp\.com|s3\.amazonaws\.com|azurewebsites\.net|ghost\.io|surge\.sh|netlify\.app)" \
            > takeover-candidates.txt 2>/dev/null || true

          TAKEOVER_COUNT=$(wc -l < takeover-candidates.txt 2>/dev/null || echo 0)
          if [ "$TAKEOVER_COUNT" -gt 0 ]; then
            echo "  POTENTIAL SUBDOMAIN TAKEOVER CANDIDATES: $TAKEOVER_COUNT"
            cat takeover-candidates.txt
          fi

      - name: Save recon results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: recon-results
          path: |
            subdomains-raw.txt
            subdomains-resolved.txt
            live-subdomains.txt
            takeover-candidates.txt
          retention-days: ${{ inputs.artifact-retention-days }}

  ssl-check:
    name: "SSL — Certificate Analysis"
    runs-on: ubuntu-latest
    if: inputs.target-domain != ''
    needs: recon
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sslyze
        run: |
          pip install sslyze --quiet

      - name: Download live subdomains
        uses: actions/download-artifact@v4
        with:
          name: recon-results
        continue-on-error: true

      - name: Run SSL checks
        run: |
          DOMAIN="${{ inputs.target-domain }}"
          SSL_LIMIT="${{ inputs.ssl-scan-limit }}"

          echo "$DOMAIN" > ssl-targets.txt
          if [ -f live-subdomains.txt ]; then
            awk '{print $1}' live-subdomains.txt | \
              sed 's|https\?://||' | \
              cut -d'/' -f1 | \
              head -"$SSL_LIMIT" >> ssl-targets.txt
          fi
          sort -u ssl-targets.txt -o ssl-targets.txt

          echo "=== SSL Analysis for: ==="
          cat ssl-targets.txt

          SSL_LIMIT_INT=${{ inputs.ssl-scan-limit }}

          python3 << PYTHON
          import subprocess, json, socket, ssl, os
          from datetime import datetime, timezone

          ssl_limit = int(os.environ.get("SSL_LIMIT_INT", "20"))
          targets = open('ssl-targets.txt').read().strip().split('\n')
          targets = [t.strip() for t in targets if t.strip()][:ssl_limit]

          results = []
          issues = []

          for target in targets:
              try:
                  result = subprocess.run(
                      ['python3', '-m', 'sslyze', '--json_out', f'{target}.json', target],
                      capture_output=True, text=True, timeout=30
                  )
                  results.append({'target': target, 'status': 'scanned'})
              except subprocess.TimeoutExpired:
                  results.append({'target': target, 'status': 'timeout'})
              except Exception as e:
                  results.append({'target': target, 'status': 'error', 'error': str(e)})

          for target in targets:
              try:
                  ctx = ssl.create_default_context()
                  with ctx.wrap_socket(socket.socket(), server_hostname=target) as s:
                      s.settimeout(10)
                      s.connect((target, 443))
                      cert = s.getpeercert()
                      expire_str = cert.get('notAfter', '')
                      if expire_str:
                          expire_date = datetime.strptime(expire_str, '%b %d %H:%M:%S %Y %Z').replace(tzinfo=timezone.utc)
                          now = datetime.now(timezone.utc)
                          days_left = (expire_date - now).days
                          if days_left < 30:
                              issues.append({
                                  'target': target,
                                  'issue': 'CERT_EXPIRING_SOON',
                                  'severity': 'HIGH' if days_left < 7 else 'MEDIUM',
                                  'detail': f'Certificate expires in {days_left} days ({expire_str})'
                              })
              except ssl.SSLError as e:
                  issues.append({
                      'target': target,
                      'issue': 'SSL_ERROR',
                      'severity': 'HIGH',
                      'detail': str(e)
                  })
              except Exception:
                  pass

          report = {
              'tool': 'ShieldFlow SSL Check',
              'timestamp': datetime.now(timezone.utc).isoformat(),
              'scanned': len(results),
              'issues': issues,
              'details': results
          }
          json.dump(report, open('ssl-report.json', 'w'), indent=2)
          print(json.dumps({'issues_found': len(issues), 'scanned': len(results)}, indent=2))
          if issues:
              print('\n⚠! SSL ISSUES FOUND:')
              for i in issues:
                  print(" [{}] {}: {}".format(i["severity"], i["target"], i["detail"]))
          PYTHON
        env:
          SSL_LIMIT_INT: ${{ inputs.ssl-scan-limit }}

      - name: Save SSL results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ssl-results
          path: |
            ssl-report.json
            ssl-targets.txt
          retention-days: ${{ inputs.artifact-retention-days }}

  nuclei-scan:
    name: "Nuclei — Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: [recon]
    if: inputs.target-url != '' || inputs.target-domain != ''
    steps:
      - name: Install Nuclei
        run: |
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@v3.3.7
          echo "$HOME/go/bin" >> $GITHUB_PATH
        env:
          GO111MODULE: on

      - name: Update Nuclei templates
        run: nuclei -update-templates -silent

      - name: Download recon results
        uses: actions/download-artifact@v4
        with:
          name: recon-results
        continue-on-error: true

      - name: Build scan targets
        run: |
          > nuclei-targets.txt

          if [ -n "${{ inputs.target-url }}" ]; then
            echo "${{ inputs.target-url }}" >> nuclei-targets.txt
          fi

          if [ -f live-subdomains.txt ]; then
            awk '{print $1}' live-subdomains.txt >> nuclei-targets.txt
          fi

          sort -u nuclei-targets.txt -o nuclei-targets.txt
          echo "=== Nuclei will scan $(wc -l < nuclei-targets.txt) targets ==="
          cat nuclei-targets.txt

      - name: Run Nuclei (scoped templates)
        run: |
          # ─── WHY THIS TEMPLATE SELECTION ───────────────────────────────
          # We explicitly exclude:
          #   -fuzzing/* : generates massive noise, needs manual triage
          #   -dos/*     : can take down target, NOT safe in CI
          #   -helpers/* : internal templates, not findings
          #
          # We focus on:
          #   - CVEs (known exploitable vulnerabilities)
          #   - misconfigurations (exposed panels, open redirects, etc.)
          #   - exposures (leaked files, API keys, sensitive data)
          #   - takeovers (subdomain and service takeovers)
          #   - ssl (certificate and TLS issues)
          # ───────────────────────────────────────────────────────────────

          nuclei \
            -list nuclei-targets.txt \
            -severity ${{ inputs.nuclei-severity }} \
            -tags ${{ inputs.nuclei-tags }} \
            -exclude-tags ${{ inputs.nuclei-exclude-tags }} \
            -rate-limit ${{ inputs.nuclei-rate-limit }} \
            -concurrency ${{ inputs.nuclei-concurrency }} \
            -timeout ${{ inputs.nuclei-timeout }} \
            -retries 1 \
            -json-export nuclei-findings.json \
            -sarif-export nuclei-findings.sarif \
            -silent \
            -no-color \
            || true

          FINDING_COUNT=$(jq '. | length' nuclei-findings.json 2>/dev/null || echo 0)
          echo "Nuclei findings: $FINDING_COUNT"

      - name: Upload Nuclei SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: nuclei-findings.sarif
          category: nuclei-scan
        continue-on-error: true

      - name: Save Nuclei results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nuclei-results
          path: |
            nuclei-findings.json
            nuclei-findings.sarif
            nuclei-targets.txt
          retention-days: ${{ inputs.artifact-retention-days }}
  dast:
    name: "DAST — OWASP ZAP"
    runs-on: ubuntu-latest
    if: inputs.target-url != '' || inputs.target-image != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start target app (Docker image mode)
        if: inputs.target-image != ''
        run: |
          docker network create shieldflow-net
          docker run -d \
            --name target-app \
            --network shieldflow-net \
            -p ${{ inputs.target-port }}:${{ inputs.target-port }} \
            ${{ inputs.target-image }}
          echo "Waiting for app to start..."
          for i in $(seq 1 12); do
            if curl -sf "http://localhost:${{ inputs.target-port }}" > /dev/null 2>&1; then
              echo "App is ready!"
              break
            fi
            sleep 5
          done

      - name: Run ZAP Full Scan (URL mode)
        if: inputs.target-url != '' && inputs.zap-scan-type != 'baseline'
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          target: ${{ inputs.target-url }}
          cmd_options: '-I -l WARN'

      - name: Run ZAP Baseline Scan (URL mode)
        if: inputs.target-url != '' && inputs.zap-scan-type == 'baseline'
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          target: ${{ inputs.target-url }}
          cmd_options: '-I -l WARN'

      - name: Run ZAP Full Scan (Docker image mode)
        if: inputs.target-image != ''
        run: |
          if [ "${{ inputs.zap-scan-type }}" = "baseline" ]; then
            SCRIPT="zap-baseline.py"
          else
            SCRIPT="zap-full-scan.py"
          fi
          mkdir -p zap-output
          docker run --rm \
            --network shieldflow-net \
            -v $(pwd)/zap-output:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            $SCRIPT \
              -t "http://target-app:${{ inputs.target-port }}" \
              -J zap-report.json \
              -r zap-report.html \
              -x zap-report.xml \
              -I \
              -l WARN || true
          sudo chown -R $(id -u):$(id -g) zap-output/ || true

      - name: Stop target app container
        if: inputs.target-image != ''
        run: |
          docker stop target-app || true
          docker rm target-app || true
          docker network rm shieldflow-net || true

      - name: Save ZAP report (Docker image mode)
        if: inputs.target-image != ''
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-results
          path: zap-output/
          retention-days: ${{ inputs.artifact-retention-days }}

  unified-report:
    name: "Report — Unified Findings"
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, nuclei-scan, dast, ssl-check]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results/
        continue-on-error: true

      - name: Generate unified report
        run: |
          pip install jinja2 --quiet

          python3 << 'PYTHON'
          import json
          import os
          import glob
          from datetime import datetime, timezone

          report = {
              "tool": "ShieldFlow",
              "version": "2.0",
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "repository": os.environ.get("GITHUB_REPOSITORY", "unknown"),
              "run_id": os.environ.get("GITHUB_RUN_ID", "unknown"),
              "commit": os.environ.get("GITHUB_SHA", "unknown")[:8],
              "summary": {
                  "critical": 0,
                  "high": 0,
                  "medium": 0,
                  "low": 0,
                  "total": 0
              },
              "findings": []
          }

          severity_map = {
              "critical": 4,
              "high": 3,
              "medium": 2,
              "low": 1,
              "info": 0
          }

          nuclei_files = glob.glob("all-results/nuclei-results/nuclei-findings.json")
          for f in nuclei_files:
              try:
                  data = json.load(open(f))
                  if not isinstance(data, list):
                      continue
                  for item in data:
                      sev = item.get("info", {}).get("severity", "info").lower()
                      finding = {
                          "source": "nuclei",
                          "id": item.get("template-id", "unknown"),
                          "name": item.get("info", {}).get("name", "Unknown"),
                          "severity": sev,
                          "target": item.get("host", item.get("url", "unknown")),
                          "description": item.get("info", {}).get("description", ""),
                          "tags": item.get("info", {}).get("tags", []),
                          "reference": item.get("info", {}).get("reference", [])
                      }
                      report["findings"].append(finding)
                      if sev in report["summary"]:
                          report["summary"][sev] += 1
              except Exception as e:
                  print(f"Warning: could not parse {f}: {e}")

          ssl_files = glob.glob("all-results/ssl-results/ssl-report.json")
          for f in ssl_files:
              try:
                  data = json.load(open(f))
                  for issue in data.get("issues", []):
                      sev = issue.get("severity", "medium").lower()
                      finding = {
                          "source": "ssl-check",
                          "id": issue.get("issue", "ssl-issue"),
                          "name": issue.get("issue", "SSL Issue"),
                          "severity": sev,
                          "target": issue.get("target", "unknown"),
                          "description": issue.get("detail", ""),
                          "tags": ["ssl", "certificate"],
                          "reference": []
                      }
                      report["findings"].append(finding)
                      if sev in report["summary"]:
                          report["summary"][sev] += 1
              except Exception as e:
                  print(f"Warning: could not parse {f}: {e}")

          sarif_sources = {
              "semgrep-results/semgrep.sarif": "semgrep",
              "trivy-results/trivy-fs.sarif": "trivy-fs",
              "trivy-results/trivy-image.sarif": "trivy-image",
              "gitleaks-results/results.sarif": "gitleaks"
          }

          for sarif_path, source_name in sarif_sources.items():
              full_path = f"all-results/{sarif_path}"
              if not os.path.exists(full_path):
                  continue
              try:
                  data = json.load(open(full_path))
                  for run in data.get("runs", []):
                      rules = {r["id"]: r for r in run.get("tool", {}).get("driver", {}).get("rules", [])}
                      for result in run.get("results", []):
                          rule_id = result.get("ruleId", "unknown")
                          rule = rules.get(rule_id, {})

                          # Map SARIF level to severity
                          level = result.get("level", "warning")
                          level_map = {
                              "error": "high",
                              "warning": "medium",
                              "note": "low",
                              "none": "info"
                          }
                          sev = level_map.get(level, "medium")

                          props = result.get("properties", {})
                          if "severity" in props:
                              sev = props["severity"].lower()

                          locations = result.get("locations", [])
                          target = "unknown"
                          if locations:
                              uri = locations[0].get("physicalLocation", {}).get("artifactLocation", {}).get("uri", "")
                              line = locations[0].get("physicalLocation", {}).get("region", {}).get("startLine", "")
                              target = f"{uri}:{line}" if line else uri

                          message = result.get("message", {}).get("text", "")
                          rule_name = rule.get("name", rule_id)

                          finding = {
                              "source": source_name,
                              "id": rule_id,
                              "name": rule_name,
                              "severity": sev,
                              "target": target,
                              "description": message,
                              "tags": [source_name],
                              "reference": []
                          }
                          report["findings"].append(finding)
                          if sev in report["summary"]:
                              report["summary"][sev] += 1
              except Exception as e:
                  print(f"Warning: could not parse {full_path}: {e}")

          report["findings"].sort(
              key=lambda x: severity_map.get(x["severity"].lower(), 0),
              reverse=True
          )
          report["summary"]["total"] = len(report["findings"])

          json.dump(report, open("shieldflow-report.json", "w"), indent=2)

          s = report["summary"]
          print("\n" + "="*50)
          print(f"  ShieldFlow — Scan Complete")
          print("="*50)
          print(f"  Repository : {report['repository']}")
          print(f"  Commit     : {report['commit']}")
          print(f"  Timestamp  : {report['generated_at']}")
          print("="*50)
          print(f"  CRITICAL   : {s['critical']}")
          print(f"  HIGH       : {s['high']}")
          print(f"  MEDIUM     : {s['medium']}")
          print(f"  LOW        : {s['low']}")
          print(f"  TOTAL      : {s['total']}")
          print("="*50)

          # Top 10 critical/high findings
          top = [f for f in report["findings"] if f["severity"] in ("critical","high")][:10]
          if top:
              print("\n  TOP FINDINGS (critical/high):")
              for i, f in enumerate(top, 1):
                  print(" [{}] {}: {}".format(i["severity"], i["target"], i["detail"]))
                  print(f"     → {f['target']}")

          PYTHON

      - name: Save unified report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shieldflow-unified-report
          path: shieldflow-report.json
          retention-days: ${{ inputs.artifact-retention-days}}

      - name: Post to SOAR (Shuffle)
        env:
          SHUFFLE_WEBHOOK_URL: ${{ secrets.shuffle-webhook-url }}
        run: |
          if [ -z "$SHUFFLE_WEBHOOK_URL" ]; then
            echo "No SHUFFLE_WEBHOOK_URL set - skipping SOAR notification"
            exit 0
          fi
          REPORT=$(cat shieldflow-report.json)
          curl -s -X POST "${{ secrets.shuffle-webhook-url }}" \
            -H "Content-Type: application/json" \
            -d "$REPORT" \
            --max-time 30 \
            || echo "SOAR webhook failed — continuing"

      - name: Fail on severity threshold
        run: |
          THRESHOLD="${{ inputs.fail-on-severity }}"
          if [ "$THRESHOLD" = "none" ]; then
            echo "Fail-on-severity is set to none - pipeline always passes."
            exit 0
          fi

          COUNT=$(python3 -c "
          import json
          r= json.load(open('shieldflow-report.json'))
          print(r['summary'].get('$THRESHOLD', 0))
          ")

          if [ "$COUNT" -gt 0 ]; then
            echo " Pipeline failed: $COUNT $THRESHOLD severity findings detected."
            echo " Review the ShieldFlow unified report artifact."
            exit 1
          fi
          echo " No $THRESHOLD findings. Pipeline passed."

