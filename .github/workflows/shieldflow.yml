name: ShieldFlow AppSec Pipeline

on:
  workflow_call:
    inputs:
      target-url:
        description: 'URL of the application to scan'
        required: true
        type: string
      target-image:
        description: 'Docker image to spin up for scanning (optional)'
        required: false
        type: string
        default: ''
      target-port:
        description: 'Port the application runs on (optional)'
        required: false
        type: string
        default: '3000'
    secrets:
      shuffle-webhook-url:
        description: 'Shuffle SOAR webhook URL for findings ingestion'
        required: false

permissions:
      security-events: write
      actions: read
      contents: read

jobs:

  sast-semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config "p/owasp-top-ten" \
            --config "p/javasript" \
            --sarif-output=semgrep.sarif \
            --error
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif

  sca-trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Scan Repository Files
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Scan Docker Image
        if: ${{ inputs.target-image != '' }}
        uses: aquasecurity/trivy-action@master
        env:
          TARGET_IMAGE: ${{ inputs.target-image }}
        with:
          scan-type: 'image'
          image-ref: ${{ inputs.target-image }}
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: '.'

  gitleaks-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dast-zap:
    if: ${{ inputs.target-url != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Start Docker target
        if: ${{ inputs.target-image != '' }}
        env:
          TARGET_IMAGE: ${{ inputs.target-image }}
          TARGET_PORT: ${{ inputs.target-port }}
        run: |
          docker pull $TARGET_IMAGE
          docker run -d --name target-app \
            -p "$TARGET_PORT:$TARGET_PORT" \
            $TARGET_IMAGE
          sleep 30
          echo "Target started on port $TARGET_PORT"

      - name: Wait for URL target
        if: ${{ inputs.target-image == '' }}
        run: |
          echo "Scanning existing target: ${{ inputs.target-url }}"
          sleep 5

      - name: Run ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ inputs.target-url }}
          fail_action: true
          cmd_options: '-a'
          format: sarif

      - name: Upload ZAP Report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'report_sarif.sarif'

      - name: Stop Docker target
        if: ${{ inputs.target-image != '' }}
        run: |
          docker stop target-app
          docker rm target-app

  notify-soar:
    runs-on: ubuntu-latest
    needs:
      - sast-semgrep
      - sca-trivy
      - gitleaks-scan
      - dast-zap
    if: always()
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: POST findings to Shuffle
        env:
          SHUFFLE_WEBHOOK_URL: ${{ secrets.SHUFFLE_WEBHOOK_URL || '' }}
        run: |
          if [ -n "$SHUFFLE_WEBHOOK_URL" ]; then
            python3 soar/soar_connector.py
          else
            echo "No SHUFFLE_WEBHOOK_URL set - skipping SOAR notification"
          fi
