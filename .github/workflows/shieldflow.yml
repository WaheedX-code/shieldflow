name: ShieldFlow AppSec Pipeline

on:
  workflow_call:
    inputs:
      target-url:
        description: 'URL of the application to scan'
        required: true
        type: string
      target-image:
        description: 'Docker image to spin up for scanning (optional)'
        required: false
        type: string
        default: ''
      target-port:
        description: 'Port the application runs on (optional)'
        required: false
        type: string
        default: '3000'
    secrets:
      shuffle-webhook-url:
        description: 'Shuffle SOAR webhook URL for findings ingestion'
        required: false

permissions:
  security-events: write
  actions: read
  contents: read

jobs:

  sast-semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config "p/owasp-top-ten" \
            --config "p/default" \
            --sarif-output=semgrep.sarif \
            --error
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif

      - name: Upload Semgrep Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep.sarif

  recon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch robots.txt
        env:
          TARGET_URL: ${{ inputs.target-url }}
        run: |
          echo "=== robots.txt ===" 
          curl -s "$TARGET_URL/robots.txt" | tee robots.txt
          echo ""
          echo "=== Disallowed paths (potential targets) ==="
          grep "Disallow" robots.txt | awk '{print $2}'

      - name: Fetch sitemap
        env:
          TARGET_URL: ${{ inputs.target-url }}
        run: |
          echo "=== Sitemap ==="
          curl -s "$TARGET_URL/sitemap.xml" | tee sitemap.xml

      - name: Check common sensitive paths
        env:
          TARGET_URL: ${{ inputs.target-url }}
        run: |
          echo "=== Probing sensitive paths ==="
          paths=(
            "/admin"
            "/api"
            "/api/v1"
            "/api/v2"
            "/.env"
            "/backup"
            "/config"
            "/dashboard"
            "/login"
            "/register"
            "/swagger"
            "/api-docs"
            "/graphql"
            "/phpinfo.php"
            "/.git"
          )
          for path in "${paths[@]}"; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET_URL$path")
            if [ "$status" != "404" ]; then
              echo "[FOUND] $TARGET_URL$path — Status: $status"
            fi
          done

      - name: Upload Recon Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: recon-results
          path: |
            robots.txt
            sitemap.xml


  sca-trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Scan Repository Files
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Scan Docker Image
        if: ${{ inputs.target-image != '' }}
        uses: aquasecurity/trivy-action@master
        env:
          TARGET_IMAGE: ${{ inputs.target-image }}
        with:
          scan-type: 'image'
          image-ref: ${{ inputs.target-image }}
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: '.'

      - name: Upload Trivy Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-fs.sarif

  gitleaks-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Gitleaks Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-results
          path: results.sarif

  dast-zap:
    if: ${{ inputs.target-url != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Start Docker target
        if: ${{ inputs.target-image != '' }}
        env:
          TARGET_IMAGE: ${{ inputs.target-image }}
          TARGET_PORT: ${{ inputs.target-port }}
        run: |
          docker pull $TARGET_IMAGE
          docker run -d --name target-app \
            -p "$TARGET_PORT:$TARGET_PORT" \
            $TARGET_IMAGE
          sleep 30
          echo "Target started on port $TARGET_PORT"

      - name: Wait for URL target
        if: ${{ inputs.target-image == '' }}
        env:
          TARGET_URL: ${{ inputs.target-url }}
        run: |
          echo "Scanning existing target: $TARGET_URL"
          sleep 5

      - name: Run ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ inputs.target-url }}
          fail_action: true
          cmd_options: '-a'

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
            report_md.md

      - name: Stop Docker target
        if: ${{ inputs.target-image != '' }}
        run: |
          docker stop target-app
          docker rm target-app

  notify-soar:
    runs-on: ubuntu-latest
    needs:
      - sast-semgrep
      - sca-trivy
      - gitleaks-scan
      - recon
      - dast-zap
    if: always()
    steps:
      - uses: actions/checkout@v3

      - name: Download Semgrep SARIF
        uses: actions/download-artifact@v4
        with:
          name: semgrep-results
          path: reports/
        continue-on-error: true

      - name: Download ZAP Results
        uses: actions/download-artifact@v4
        with:
          name: zap-report
          path: reports/
        continue-on-error: true

      - name: Download Trivy Results
        uses: actions/download-artifact@v4
        with:
          name: trivy-results
          path: reports/
        continue-on-error: true

      - name: Download Gitleaks Results
        uses: actions/download-artifact@v4
        with:
          name: gitleaks-results
          path: reports/
        continue-on-error: true

      - name: Download Recon Results
        uses: actions/download-artifact@v4
        with:
          name: recon-results
          path: reports/
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: POST findings to Shuffle
        env:
          SHUFFLE_WEBHOOK_URL: ${{ secrets.SHUFFLE_WEBHOOK_URL || '' }}
        run: |
          if [ -n "$SHUFFLE_WEBHOOK_URL" ]; then
            python3 soar/soar_connector.py
          else
            echo "No SHUFFLE_WEBHOOK_URL set - skipping SOAR notification"
          fi
